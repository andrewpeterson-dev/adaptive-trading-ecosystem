name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trading_ecosystem_test
          POSTGRES_USER: trader
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trader"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: trading_ecosystem_test
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: testpass
      USE_SQLITE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-3.11
          restore-keys: |
            pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-full.txt

      - name: Postgres initialization smoke test
        env:
          USE_SQLITE: "false"
        run: |
          python - <<'PY'
          import asyncio
          from db.database import init_db, close_db

          async def main():
              await init_db()
              await close_db()

          asyncio.run(main())
          PY

      - name: Run tests
        run: pytest tests/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build
